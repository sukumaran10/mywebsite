<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

display:flex;

justify-content:center;

align-items:center;

height:100vh;

background:linear-gradient(135deg,#005792,#0077b6);

}

.container{

background:white;

padding:50px;

border-radius:20px;

text-align:center;

max-width:650px;

width:90%;

box-shadow:0 20px 50px rgba(0,0,0,.25);

animation:fade 1s;

}

.icon{

font-size:80px;

color:#28a745;

margin-bottom:20px;

}

h1{

color:#005792;

margin-bottom:15px;

}

p{

font-size:18px;

line-height:1.8;

color:#555;

margin-bottom:30px;

}

a{

display:inline-block;

padding:15px 35px;

background:#ff9800;

color:white;

text-decoration:none;

border-radius:10px;

font-weight:600;

transition:.3s;

}

a:hover{

background:#f57c00;

transform:translateY(-3px);

}

@keyframes fade{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>
